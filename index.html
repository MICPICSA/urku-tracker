async function sGet(k) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/app_data?key=eq.${encodeURIComponent(k)}&select=value`, { headers: SB_HEADERS });
    if (!r.ok) throw new Error("Supabase read failed");
    const data = await r.json();
    return data && data[0] && data[0].value !== undefined ? data[0].value : null;
  } catch (err) {
    console.error("sGet", k, err);
    return null;
  }
}
async function sSet(k, v) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/app_data?key=eq.${encodeURIComponent(k)}`, {
      method: "PATCH",
      headers: { ...SB_HEADERS, Prefer: "return=minimal" },
      body: JSON.stringify({ value: v, updated_at: new Date().toISOString() })
    });
    if (!r.ok) {
      await fetch(`${SB_URL}/rest/v1/app_data`, {
        method: "POST",
        headers: { ...SB_HEADERS, Prefer: "return=minimal" },
        body: JSON.stringify({ key: k, value: v, updated_at: new Date().toISOString() })
      });
    }
  } catch (err) {
    console.error("sSet", k, err);
  }
}

};

function getStatus(list) {
  if (list.ms) return list.ms;
  const now = new Date(), up = new Date(list.at);
  if (list.day === "monday") {
    const d1 = new Date(up); d1.setHours(12, 30, 0, 0);
    const d2 = new Date(d1); d2.setDate(d1.getDate() + 1);
    return now <= d1 ? "active" : now <= d2 ? "at-risk" : "expired";
  }
  const fri = new Date(up), dof = up.getDay();
  fri.setDate(up.getDate() + (dof <= 5 ? 5 - dof : 5 + 7 - dof));
  fri.setHours(23, 59, 59, 0);
  return now <= fri ? "active" : "expired";
}

                <td style={{ padding:3 }}><input value={row.variety} onChange={e => upd(row.id,"variety",e.target.value)} style={{ ...inp, width:130 }} placeholder="ROSE ALBA"/></td>

                <td style={{ padding:3 }}><input type="number" value={row.stems} onChange={e => upd(row.id,"stems",e.target.value)} style={{ ...inp, width:60 }} placeholder="400"/></td>
                <td style={{ padding:3 }}><input type="number" step="0.01" value={row.pt} onChange={e => upd(row.id,"pt",e.target.value)} style={{ ...inp, width:65 }} placeholder="0.40"/></td>
                <td style={{ padding:3 }}><input type="number" step="0.01" value={row.pc} onChange={e => upd(row.id,"pc",e.target.value)} style={{ ...inp, width:65 }} placeholder="0.43"/></td>
                <td style={{ padding:3 }}><select value={row.ch} onChange={e => upd(row.id,"ch",e.target.value)} style={{ ...inp, width:110 }}>{CHANNELS.map(c => <option key={c}>{c}</option>)}</select></td>
                <td style={{ padding:3 }}><button onClick={() => setRows(rs => rs.filter(r => r.id !== row.id))} style={{ background:"#fee2e2", border:"none", borderRadius:4, color:"#991b1b", cursor:"pointer", padding:"4px 8px", fontSize:11 }}>✕</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ display:"flex", gap:10, marginTop:14, flexWrap:"wrap" }}>
        <button onClick={() => setRows(rs => [...rs, emptyRow()])} style={{ background:"#eff6ff", border:"1px solid #bfdbfe", borderRadius:8, color:"#1d4ed8", cursor:"pointer", padding:"8px 14px", fontSize:13, fontWeight:600 }}>{t.addRow}</button>
        <button onClick={() => { const v = rows.filter(r => r.qty && r.variety); if (!v.length) return; onPub(v, day); setRows([emptyRow()]); }}
          style={{ background:"#0f172a", border:"none", borderRadius:8, color:"#fff", cursor:"pointer", padding:"8px 18px", fontSize:13, fontWeight:700 }}>{t.publish}</button>
        <button onClick={() => setRows([emptyRow()])} style={{ background:"#f1f5f9", border:"1px solid #e2e8f0", borderRadius:8, color:"#6b7280", cursor:"pointer", padding:"8px 14px", fontSize:13 }}>{t.clear}</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   AVAILABILITY TAB
   ══════════════════════════════════════════════════════════════════════════ */

function AvailTab({ lists, res, eff, isF, va, onRes, onDelRow, onEditRow, onStatus, onDelList, t }) {
  const [modal, setModal] = useState(null);
  const [cfm, setCfm] = useState(null);
  const canEdit = isF && !va;
  const canRes  = !isProcLike(eff.role);

  const sorted = [...lists].sort((a, b) => {
    const o = { active:0, "at-risk":1, expired:2 };
    const sa = getStatus(a), sb = getStatus(b);
    return o[sa] !== o[sb] ? o[sa] - o[sb] : new Date(b.at) - new Date(a.at);
  });

  if (!sorted.length) return <div style={{ padding:40, textAlign:"center", color:"#9ca3af", fontSize:14 }}>{t.noLists}</div>;

  return (
    <div style={{ padding:16 }}>
      {modal?.t === "res" && <ReserveModal row={modal.row} onConfirm={q => onRes(modal.lid, modal.row.id, q, eff.name)} onClose={() => setModal(null)} t={t} />}
      {modal?.t === "edit" && <EditModal row={modal.row} onSave={u => { onEditRow(modal.lid, modal.row.id, u); setModal(null); }} onClose={() => setModal(null)} t={t} />}
      {cfm && <ConfirmModal msg={cfm.msg} onYes={() => { cfm.fn(); setCfm(null); }} onNo={() => setCfm(null)} />}

      {sorted.map(list => {
        const st = getStatus(list), sc = SC[st];
        return (
          <div key={list.id} style={{ background:"#fff", borderRadius:12, border:`1px solid ${sc.bd}`, marginBottom:18, overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
            <div style={{ background:sc.bg, padding:"10px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                <span style={{ background:sc.c, color:"#fff", borderRadius:5, padding:"2px 8px", fontSize:10, fontWeight:700, letterSpacing:1 }}>
                  {st === "active" ? t.active : st === "at-risk" ? t.atRisk : t.expired}
                </span>
                <span style={{ fontSize:12, fontWeight:700, color:"#1e293b" }}>
                  {list.day === "monday" ? `🌙 ${t.mon}` : `📅 ${t.tue}`}
                </span>
                <span style={{ fontSize:11, color:"#6b7280" }}>{t.by} <b>{list.who}</b> {t.at} {fmt(list.at)}</span>
              </div>
              {canEdit && (
                <div style={{ display:"flex", gap:6 }}>
                  <button onClick={() => onStatus(list.id, st === "expired" ? null : "expired")}
                    style={{ background: st === "expired" ? "#dcfce7" : "#fee2e2", border:"none", borderRadius:6, padding:"3px 9px", fontSize:11, cursor:"pointer", fontWeight:600, color: st === "expired" ? "#166534" : "#991b1b" }}>
                    {st === "expired" ? t.restore : t.expire}
                  </button>
                  <button onClick={() => setCfm({ msg:t.cDelList, fn:() => onDelList(list.id) })}
                    style={{ background:"#fee2e2", border:"none", borderRadius:6, padding:"3px 9px", fontSize:11, cursor:"pointer", fontWeight:600, color:"#991b1b" }}>{t.delList}</button>
                </div>
              )}
            </div>
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, minWidth:780 }}>
                <thead>
                  <tr style={{ background:"#f8fafc", borderBottom:"1px solid #e2e8f0" }}>
                    {[t.qty, t.box, t.variety, t.len, t.farm, t.stems, t.pt, t.pc, t.ch, t.avail, t.actions].map((h, i) => (
                      <th key={i} style={{ padding:"7px 9px", textAlign:"left", fontWeight:600, color:"#374151", whiteSpace:"nowrap", fontSize:11 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {list.rows.map(row => {
                    const rr = res.filter(r => r.rid === row.id);
                    const out = row.rem <= 0;
                    return (
                      <tr key={row.id} style={{ borderBottom:"1px solid #f1f5f9", background: out ? "#fafafa" : "#fff", opacity: out ? 0.65 : 1 }}>
                        <td style={{ padding:"7px 9px", fontWeight:700 }}>{row.qty}</td>
                        <td style={{ padding:"7px 9px" }}><span style={{ background:"#eff6ff", color:"#1d4ed8", borderRadius:4, padding:"2px 6px", fontWeight:700, fontSize:11 }}>{row.boxType}</span></td>
                        <td style={{ padding:"7px 9px", fontWeight:600 }}>{row.variety}</td>
                        <td style={{ padding:"7px 9px", color:"#6b7280" }}>{row.length}</td>
                        <td style={{ padding:"7px 9px", color:"#6b7280", fontSize:11 }}>{row.farm}</td>
                        <td style={{ padding:"7px 9px" }}>{row.stems}</td>
                        <td style={{ padding:"7px 9px", color:"#059669", fontWeight:700 }}>${row.pt}</td>
                        <td style={{ padding:"7px 9px", color:"#059669", fontWeight:700 }}>${row.pc}</td>
                        <td style={{ padding:"7px 9px", fontSize:11, color:"#6b7280" }}>{row.ch}</td>
                        <td style={{ padding:"7px 9px" }}>
                          <span style={{ fontWeight:700, fontSize:13, color: row.rem > 0 ? "#059669" : "#dc2626" }}>{row.rem}</span>
                          <span style={{ color:"#9ca3af", fontSize:11 }}> {t.of} {row.qty}</span>
                        </td>
                        <td style={{ padding:"7px 9px" }}>
                          <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                            <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                              {canRes && st !== "expired" && !out && (
                                <Btn onClick={() => setModal({ t:"res", lid:list.id, row })} style={{ padding:"3px 9px", fontSize:11 }}>{t.reserve}</Btn>
                              )}
                              {canEdit && (
                                <>
                                  <button onClick={() => setModal({ t:"edit", lid:list.id, row })} style={{ background:"#eff6ff", border:"none", borderRadius:5, color:"#1d4ed8", padding:"3px 7px", fontSize:11, cursor:"pointer" }}>{t.edit}</button>
                                  <button onClick={() => setCfm({ msg:t.cDel, fn:() => onDelRow(list.id, row.id) })} style={{ background:"#fee2e2", border:"none", borderRadius:5, color:"#991b1b", padding:"3px 7px", fontSize:11, cursor:"pointer" }}>{t.del}</button>
                                </>
                              )}
                            </div>
                            {rr.length > 0 && (
                              <div style={{ fontSize:10, color:"#7C3AED", fontWeight:600 }}>
                                {rr.map(r => `${r.who}(${r.qty})`).join(", ")}
                              </div>
                            )}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function ResTab({ res, lists, eff, isF, va, onCancel, t }) {
  const [cfm, setCfm] = useState(null);
  const all = (isF && !va) || isProcLike(eff.role);
  const canVoid = (isF && !va) || eff.role === "procurement";
  const shown = all ? res : res.filter(r => r.who === eff.name);
  const getRow = (r) => { const l = lists.find(x => x.id === r.lid); return l ? l.rows.find(x => x.id === r.rid) : null; };

  if (!shown.length) return <div style={{ padding:40, textAlign:"center", color:"#9ca3af", fontSize:14 }}>{t.noRes}</div>;

  return (
    <div style={{ padding:16 }}>
      {cfm && <ConfirmModal msg={cfm.msg} onYes={() => { cfm.fn(); setCfm(null); }} onNo={() => setCfm(null)} />}
      <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead>
            <tr style={{ background:"#f8fafc", borderBottom:"1px solid #e2e8f0" }}>
              {[t.uName, t.variety, t.qty, t.farm, t.time, ...(canVoid ? [t.actions] : [])].map((h, i) => (
                <th key={i} style={{ padding:"9px 12px", textAlign:"left", fontWeight:600, color:"#374151", fontSize:11 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {shown.map(r => {
              const row = getRow(r);
              return (
                <tr key={r.id} style={{ borderBottom:"1px solid #f8fafc" }}>
                  <td style={{ padding:"9px 12px" }}><span style={{ background:"#ede9fe", color:"#7C3AED", borderRadius:4, padding:"2px 7px", fontWeight:700, fontSize:11 }}>{r.who}</span></td>
                  <td style={{ padding:"9px 12px", fontWeight:600 }}>{row ? `${row.variety} ${row.length}cm (${row.boxType})` : "—"}</td>
                  <td style={{ padding:"9px 12px", fontWeight:700, fontSize:14 }}>{r.qty}</td>
                  <td style={{ padding:"9px 12px", color:"#6b7280", fontSize:11 }}>{row ? row.farm : "—"}</td>

                        style={{ background:"#fee2e2", border:"none", borderRadius:5, color:"#991b1b", padding:"3px 9px", fontSize:11, cursor:"pointer", fontWeight:600 }}>{t.void}</button>
                    </td>
                  )}

              );
            })}

        </table>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   USERS TAB
   ══════════════════════════════════════════════════════════════════════════ */

function UsersTab({ pwds, onUpd, t, logo, onLogo }) {
  const [vals, setVals]   = useState({});
  const [saved, setSaved] = useState({});
  const [show, setShow]   = useState({});
  const [logoMsg, setLogoMsg] = useState("");

  const submit = (u) => {
    const v = (vals[u.id] || "").trim();
    if (!v) return;
    onUpd(u.id, v);
    setSaved(p => ({ ...p, [u.id]: true }));
    setVals(p => ({ ...p, [u.id]: "" }));
    setTimeout(() => setSaved(p => ({ ...p, [u.id]: false })), 2500);
  };

  const handleLogo = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      onLogo(reader.result);
      setLogoMsg("✓ Logo uploaded!");
      setTimeout(() => setLogoMsg(""), 3000);
    };
    reader.readAsDataURL(file);
  };

  return (
    <div style={{ padding:20 }}>
      {/* Logo Upload Section */}
      <div style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:12, padding:20, marginBottom:24, maxWidth:520 }}>
        <div style={{ fontWeight:700, fontSize:14, color:"#1e293b", marginBottom:8 }}>🎨 Company Logo</div>
        <div style={{ fontSize:12, color:"#6b7280", marginBottom:14 }}>Upload your logo (PNG/JPG). It will appear on the login screen and header across all pages.</div>
        <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
          {logo && <img src={logo} alt="Current logo" style={{ height:40, width:"auto", objectFit:"contain", border:"1px solid #e2e8f0", borderRadius:6, padding:4 }} />}
          <label style={{ background:"#7C3AED", color:"#fff", borderRadius:8, padding:"8px 16px", fontSize:12, fontWeight:600, cursor:"pointer", display:"inline-block" }}>
            {logo ? "Change Logo" : "Upload Logo"}
            <input type="file" accept="image/*" onChange={handleLogo} style={{ display:"none" }} />
          </label>
          {logo && <button onClick={() => { onLogo(null); setLogoMsg("Logo removed."); setTimeout(() => setLogoMsg(""), 3000); }}
            style={{ background:"#fee2e2", border:"none", borderRadius:8, color:"#991b1b", padding:"8px 14px", fontSize:12, cursor:"pointer", fontWeight:600 }}>Remove</button>}
          {logoMsg && <span style={{ fontSize:12, color:"#059669", fontWeight:600 }}>{logoMsg}</span>}
        </div>
      </div>

      {/* Password Management */}
      <div style={{ fontWeight:700, fontSize:16, marginBottom:4, color:"#1e293b" }}>{t.usersTitle}</div>
      <div style={{ fontSize:12, color:"#6b7280", marginBottom:20 }}>Only Michael can change passwords.</div>
      <div style={{ display:"flex", flexDirection:"column", gap:10, maxWidth:520 }}>
        {USERS.map(u => (
          <div key={u.id} style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:12, padding:"14px 16px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
            <div style={{ width:36, height:36, borderRadius:"50%", background:"#ede9fe", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>
              {roleIcon(u.role)}
            </div>
            <div style={{ minWidth:90 }}>
              <div style={{ fontWeight:700, fontSize:13, color:"#1e293b" }}>{u.name}</div>
              <div style={{ fontSize:11, color:"#6b7280" }}>{t[u.role]}</div>
            </div>
            <div style={{ flex:1, display:"flex", gap:6, alignItems:"center", minWidth:200 }}>
              <div style={{ position:"relative", flex:1 }}>
                <input type={show[u.id] ? "text" : "password"} placeholder={t.newPwd} value={vals[u.id] || ""}
                  onChange={e => setVals(p => ({ ...p, [u.id]: e.target.value }))}
                  onKeyDown={e => e.key === "Enter" && submit(u)}
                  style={{ width:"100%", border:"1px solid #e2e8f0", borderRadius:7, padding:"7px 32px 7px 10px", fontSize:12, boxSizing:"border-box" }} />
                <button onClick={() => setShow(p => ({ ...p, [u.id]: !p[u.id] }))}
                  style={{ position:"absolute", right:6, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", fontSize:12, color:"#94a3b8" }}>
                  {show[u.id] ? "🙈" : "👁"}
                </button>
              </div>
              <Btn onClick={() => submit(u)} style={{ padding:"7px 12px", whiteSpace:"nowrap" }}>{t.update}</Btn>
              <button onClick={() => { onUpd(u.id, u.pwd); setSaved(p => ({ ...p, [u.id]: true })); setTimeout(() => setSaved(p => ({ ...p, [u.id]: false })), 2500); }}
                style={{ background:"#f1f5f9", border:"none", borderRadius:7, color:"#374151", padding:"7px 10px", fontSize:11, cursor:"pointer", whiteSpace:"nowrap" }}>
                {t.reset}
              </button>
            </div>
            {saved[u.id] && <span style={{ fontSize:11, color:"#059669", fontWeight:600 }}>✓ {t.pwdOk}</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   APP ROOT
   ══════════════════════════════════════════════════════════════════════════ */

function App() {
  const [user,  setUser]  = useState(null);
  const [lang,  setLang]  = useState("en");
  const [lists, setLists] = useState([]);
  const [res,   setRes]   = useState([]);
  const [audit, setAudit] = useState([]);
  const [pwds,  setPwds]  = useState({});
  const [logo,  setLogo]  = useState(null);
  const [ok,    setOk]    = useState(false);
  const [va,    setVa]    = useState(null);
  const [tab,   setTab]   = useState("avail");
  const t = T[lang];

  useEffect(() => {
    (async () => {
      const [l, r, a, p, lg] = await Promise.all([sGet(SK.l), sGet(SK.r), sGet(SK.a), sGet(SK.p), sGet(SK.logo)]);
      setLists(l || []); setRes(r || []); setAudit(a || []); setPwds(p || {}); setLogo(lg || null); setOk(true);
    })();
  }, []);

  useEffect(() => { if (ok) sSet(SK.l, lists); },  [lists, ok]);
  useEffect(() => { if (ok) sSet(SK.r, res); },    [res, ok]);
  useEffect(() => { if (ok) sSet(SK.a, audit); },  [audit, ok]);
  useEffect(() => { if (ok) sSet(SK.p, pwds); },   [pwds, ok]);
  useEffect(() => { if (ok) sSet(SK.logo, logo); }, [logo, ok]);

  const log = (act, det, who) => setAudit(a => [{ id:uid(), who, act, det, at:new Date().toISOString() }, ...a]);

  const pub = (rows, day) => {
    const list = { id:uid(), who:user.name, at:new Date().toISOString(), day, rows:rows.map(r => ({ ...r, rem:Number(r.qty) })), ms:null };
    setLists(l => [list, ...l]);
    log("PUBLISH", `${rows.length} rows | ${day}`, user.name);
  };

  const sendNotification = (who, qty, row) => {
    try {
      const cc = USERS.map(u => u.email).join(",");
      const subject = `URKU DAILY - New Reservation by ${who}`;
      const body = `New reservation in URKU Availability Tracker:

Sales Rep: ${who}
Quantity: ${qty} box(es)
Variety: ${row.variety}
Length: ${row.length}cm
Box Type: ${row.boxType}
Farm: ${row.farm}
Stems: ${row.stems}
Price (Transfer): ${row.pt}
Price (Card): ${row.pc}
Channel: ${row.ch}
Remaining after reservation: ${row.rem - qty}

Timestamp: ${new Date().toLocaleString()}

---
URKU Availability Tracker - Desarrollado por Michael Llerena`;
      window.open(`mailto:sales@urkuexpressions.com?cc=${encodeURIComponent(cc)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`, "_blank");
    } catch (err) {
      console.error("Mailto notification failed:", err);
    }
  };

  const reserve = (lid, rid, qty, who) => {
    const list = lists.find(l => l.id === lid);
    const row = list ? list.rows.find(r => r.id === rid) : null;
    if (row) sendNotification(who, qty, row);
    const r = { id:uid(), lid, rid, qty:Number(qty), who, at:new Date().toISOString() };
    setRes(rs => [r, ...rs]);
    setLists(ls => ls.map(l => l.id !== lid ? l : { ...l, rows:l.rows.map(r => r.id !== rid ? r : { ...r, rem:r.rem - Number(qty) }) }));
    log("RESERVE", `${who} reserved ${qty} box(es)`, who);
  };

  const cancel = (resId) => {
    const r = res.find(x => x.id === resId); if (!r) return;
    setRes(rs => rs.filter(x => x.id !== resId));
    setLists(ls => ls.map(l => l.id !== r.lid ? l : { ...l, rows:l.rows.map(x => x.id !== r.rid ? x : { ...x, rem:x.rem + r.qty }) }));
    log("CANCEL", `Voided ${r.who}'s ${r.qty} box(es)`, user.name);
  };

  const delRow = (lid, rid) => {
    setLists(ls => ls.map(l => l.id !== lid ? l : { ...l, rows:l.rows.filter(r => r.id !== rid) }));
    log("DELETE_ROW", "Row deleted", user.name);
  };

  const editRow = (lid, rid, upd) => {
    setLists(ls => ls.map(l => l.id !== lid ? l : { ...l, rows:l.rows.map(r => r.id !== rid ? r : { ...r, ...upd, id:r.id, rem:r.rem }) }));
    log("EDIT_ROW", "Row edited", user.name);
  };

  const setSt = (lid, s) => {
    setLists(ls => ls.map(l => l.id !== lid ? l : { ...l, ms:s }));
    log("STATUS", `=> ${s || "auto"}`, user.name);
  };

  const delList = (lid) => {
    setLists(ls => ls.filter(l => l.id !== lid));
    log("DELETE_LIST", "List deleted", user.name);
  };

  const updPwd = (uid2, np) => {
    setPwds(p => ({ ...p, [uid2]: np }));
    log("PWD_CHANGE", `Password changed for ${uid2}`, user.name);
  };

  const isF = user?.role === "founder";
  const eff = va && isF ? USERS.find(u => u.id === va) : user;

  if (!ok) return <div style={{ minHeight:"100vh", background:"#0f172a", display:"flex", alignItems:"center", justifyContent:"center", color:"#94a3b8" }}>Loading...</div>;
  if (!user) return <Login onLogin={u => { setUser(u); setTab("avail"); }} lang={lang} setLang={setLang} t={t} pwds={pwds} logo={logo} />;

  return (
    <div style={{ minHeight:"100vh", background:"#f8fafc" }}>
      <Header user={user} isF={isF} va={va} setVa={id => { setVa(id || null); setTab("avail"); }} setLang={setLang} t={t}
        onLogout={() => { setUser(null); setVa(null); setTab("avail"); }} tab={tab} setTab={setTab} logo={logo} />
      {va && (
        <div style={{ background:"#fef9c3", borderBottom:"1px solid #fde047", padding:"5px 16px", fontSize:11, color:"#854d0e", fontWeight:600 }}>
          👁 {t.prevAs}: <b>{USERS.find(u => u.id === va)?.name}</b> — {t.adminNote}
        </div>
      )}
      <div style={{ maxWidth:1400, margin:"0 auto" }}>
        {tab === "upload" && !va && (user.role === "founder" || isProcLike(user.role)) && <UploadForm onPub={pub} t={t} />}
        {tab === "avail" && <AvailTab lists={lists} res={res} eff={eff} isF={isF} va={va} onRes={reserve} onDelRow={delRow} onEditRow={editRow} onStatus={setSt} onDelList={delList} t={t} />}
        {tab === "res" && <ResTab res={res} lists={lists} eff={eff} isF={isF} va={va} onCancel={cancel} t={t} />}
        {tab === "audit" && isF && !va && <AuditTab audit={audit} t={t} />}
        {tab === "users" && isF && !va && <UsersTab pwds={pwds} onUpd={updPwd} t={t} logo={logo} onLogo={setLogo} />}
        <Footer />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
